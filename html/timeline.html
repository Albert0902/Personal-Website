                    </div>

            <div class="timeline_title">网站更新记录</div>
            <ul class="timeline_list">
                <li class="update_card" onclick="openModal()">
                    <div class="timeline_dot"></div>
                    <div class="timeline_icons">

                        <img class="timeline_icon" src="https://github.githubassets.com/favicons/favicon.png">

                    </div>

                <li class="update_card" onclick="openModal3()">

                        <div>背景上的小点用代码代替</div>
                        <div>2026.07.11</div>
                    </div>
                </li>
                <li class="update_card" onclick="openModal4()">
                    <div class="timeline_dot"></div>
                    <div class="timeline_text">
                        <div>添加二维码</div>
                        <div>2026.07.19</div>
                    </div>
                </li>
            </ul>
        </div>

        <div class="honor-popup-content">
            <img src="../static/img/update1.png" alt="">

                <a class="honor-popup-btn" href="https://www.bilibili.com/video/BV1KC736sEFC/?spm_id_from=333.1387.0.0&vd_source=f2f747ffc04b0d8fc4320400a73c7ef7" target="_blank">前往B站</a>
